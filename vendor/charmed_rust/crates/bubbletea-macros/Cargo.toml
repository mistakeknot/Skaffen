[package]
name = "charmed-bubbletea-macros"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
authors.workspace = true
readme = "README.md"
documentation = "https://docs.rs/charmed-bubbletea-macros"
description = "Procedural macros for bubbletea TUI framework"
keywords = ["proc-macro", "tui", "bubbletea", "derive", "macro"]

[lib]
name = "bubbletea_macros"
proc-macro = true

[dependencies]
syn = { version = "2.0", features = ["full", "parsing", "extra-traits"] }
quote = "1.0"
proc-macro2 = "1.0"
darling = "0.23"
proc-macro-error2 = "2.0"
[dev-dependencies]
trybuild = "1.0"

[lints]
workspace = true
