[package]
name = "charmed-wish"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
authors.workspace = true
readme = "README.md"
documentation = "https://docs.rs/charmed-wish"
description = "Build SSH applications with bubbletea TUI interfaces"
keywords = ["ssh", "terminal", "tui", "server", "cli"]
categories = ["command-line-interface"]

[lib]
name = "wish"

[dependencies]
bubbletea = { workspace = true }
lipgloss = { workspace = true }
charmed_log = { workspace = true }
async-trait = "0.1"
tokio = { version = "1.35", features = ["full", "sync", "time", "net", "io-util", "macros", "rt-multi-thread"] }
thiserror = "2"
tracing = "0.1"
futures = "0.3"
parking_lot = "0.12"
bytes = "1.5"
lru = { workspace = true }
russh = { workspace = true }
russh-keys = { workspace = true }
ssh-key = "0.6.7"

# SSH support - optional for now since russh-keys is in beta
# russh = "0.56"
# russh-keys = { version = "0.50.0-beta.7" }

[dev-dependencies]
tokio-test = "0.4"
tracing-subscriber = "0.3"
tempfile = { workspace = true }
portable-pty = "0.9.0"

[lints]
workspace = true
