\* TLC model checker configuration for Asupersync (bd-11g3i)
\*
\* Bounded configuration: 2 tasks, 2 regions, 1 obligation, mask depth 2.
\* This is the smallest interesting configuration that exercises:
\*   - Nested regions (parent/child)
\*   - Multiple tasks with cancel interleaving
\*   - Obligation lifecycle
\*
\* Reproducible run (SEM-07.1 baseline):
\*   TLC_WORKERS=auto TLC_DEPTH=100 scripts/run_model_check.sh --ci
\*   Output artifacts:
\*     - formal/tla/output/result.json
\*     - formal/tla/output/tlc_*.log
\*
\* Safety-only note:
\*   Spec checks safety guarantees under `[][Next]_vars` (no fairness clauses).
\*   `AssumptionEnvelopeInvariant` is also checked to make bounded assumptions explicit.
\*   Liveness/progress is documented but not model-checked in this cfg.
\*
\* Larger configurations (3 tasks, 3 regions) require more workers/time.

CONSTANTS
    TaskIds = {1, 2}
    RegionIds = {1, 2}
    ObligationIds = {1}
    RootRegion = 1
    MAX_MASK = 2

INVARIANT
    Inv
    AssumptionEnvelopeInvariant

SPECIFICATION
    Spec
